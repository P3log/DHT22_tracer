<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Server Control</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/loader.css">
</head>
<body>
<div class="header-container">
    <div class="header">
        <div class="title">
            <h1>Serre</h1>
        </div>
    
        <div class="controls">
            <input type="number" id="interval" placeholder="min" class="input-small">
    
            <button class="btn btn-start" onclick="startTracer()">Lancer</button>
            <button class="btn btn-stop" onclick="stopTracer()">Arrêter</button>
        </div>
    </div>
    
    <div class="panel row">
        <button id="btnList" class="btn" onclick="getList()">Fichiers de mesure</button>
    
        <div class="spacer"></div>
    
        <label class="btn file-upload">
            Charger CSV
            <input type="file" id="fileInput" accept=".csv">
        </label>
        
        <button class="btn" onclick="getLogs()">Logs</button>
    </div>
</div>


<div id="fileList"></div>

<h2>Données</h2>
<div class="panel">
    <button id="toggleChartBtn">Graphique</button>
    <div id="chartContainer" class="collapsed">
        <canvas id="chart"></canvas>
    </div>
</div>
<pre id="output"></pre>

<script type="module" src="./js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

</body>
</html>
