<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Server Control</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/loader.css">
</head>
<body>

<h1>Serre</h1>

<div class="panel">

    <button id="btnList" onclick="getList()">Fichiers de mesure</button>

    <input type="number" id="interval" placeholder="Intervalle (min)">

    <button onclick="startTracer()">Lancer capteur</button>

    <button onclick="stopTracer()">Arrêter capteur</button>

    <button onclick="getLogs()">Logs</button>

    <label for="fileInput">Fichier</label>
    <input type="file" id="fileInput" accept=".csv">

</div>

<div id="fileList"></div>

<h2>Données</h2>
<div class="panel">
    <button id="toggleChartBtn">Graphique</button>
    <div id="chartContainer" class="collapsed">
        <canvas id="chart"></canvas>
    </div>
</div>
<pre id="output"></pre>

<script type="module" src="./js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

</body>
</html>
